name: Sovereign Stack Deploy

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'aws/**'
      - 'main.tf'
      - '.github/workflows/deploy.yml'

concurrency:
  group: terraform
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-central-1
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_poly_api_key: ${{ secrets.POLY_API_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PolyAPI SDK
        # This ensures the node_modules exist for Terraform to zip into the Layer
        env:
          POLY_API_KEY: ${{ secrets.POLY_API_KEY }}
          POLY_API_BASE_URL: https://eu1.polyapi.io
        run: |
          # 1. Standard Install & Generate
          npm install polyapi@eu1
          npx poly generate
          
          # 2. Define the exact target inside the Lambda folder
          TARGET_DIR="aws/lambda/green-logistics-optimizer-lambda-edelic/node_modules/polyapi"
          mkdir -p "$TARGET_DIR"
          
          # 3. Copy the package files from the root node_modules
          cp -r node_modules/polyapi/* "$TARGET_DIR/"
          
          # 4. CRITICAL: Copy the hidden .poly folder from the PROJECT ROOT 
          # This is where 'poly generate' actually places the logic.
          cp -r .poly "$TARGET_DIR/"
          
          # 5. Verification
          echo "Checking if .poly exists in the Lambda folder:"
          ls -la "$TARGET_DIR/.poly"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false