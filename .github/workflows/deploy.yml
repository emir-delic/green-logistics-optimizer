name: Sovereign Stack Deploy

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'aws/**'
      - 'main.tf'
      - '.github/workflows/deploy.yml'

concurrency:
  group: terraform
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-central-1
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_poly_api_key: ${{ secrets.POLY_API_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PolyAPI SDK & Package Lambda
        env:
          POLY_API_KEY: ${{ secrets.POLY_API_KEY }}
          POLY_API_BASE_URL: https://eu1.polyapi.io
        run: |
          npm install polyapi@eu1
          npx poly generate
          
          # 1. Create a clean build staging area
          mkdir -p build_dist/node_modules/polyapi
          
          # 2. Copy the handler
          cp aws/lambda/green-logistics-optimizer-lambda-edelic/index.mjs build_dist/
          
          # 3. Copy the SDK logic and the hidden brain (.poly)
          # Using -a to preserve hidden files and directory structure
          cp -a node_modules/polyapi/. build_dist/node_modules/polyapi/
          
          # 4. Explicitly copy .poly if it was generated in the root node_modules
          if [ -d "node_modules/.poly" ]; then
            cp -a node_modules/.poly build_dist/node_modules/polyapi/
          fi
          
          # 5. Create the ZIP from inside build_dist
          cd build_dist
          zip -r ../optimizer.zip .
          cd ..
          
          # 6. Verify the ZIP contains the brain
          unzip -l optimizer.zip | grep ".poly"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false -var="poly_api_key=${{ secrets.POLY_API_KEY }}"
