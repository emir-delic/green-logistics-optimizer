name: Sovereign Stack Deploy

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'aws/**'
      - 'main.tf'
      - '.github/workflows/deploy.yml'

concurrency:
  group: terraform
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-central-1
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_poly_api_key: ${{ secrets.POLY_API_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PolyAPI SDK & Package Lambda
        id: package
        env:
          POLY_API_KEY: ${{ secrets.POLY_API_KEY }}
          POLY_API_BASE_URL: https://eu1.polyapi.io
        run: |
          npm install polyapi@eu1
          npx poly generate
          
          # 1. Clean build directory
          mkdir -p build_dist/node_modules/polyapi/.poly/lib
          
          # 2. Copy the handler
          cp aws/lambda/green-logistics-optimizer-lambda-edelic/index.mjs build_dist/
          
          # 3. Copy the base polyapi package (standard files)
          cp -r node_modules/polyapi/* build_dist/node_modules/polyapi/
          
          # 4. THE BRUTE FORCE: 
          # Instead of just copying the folder, we copy the CONTENTS 
          # of the generated .poly folder into the expected /lib path.
          # npx poly generate usually puts stuff in .poly/lib/ or just .poly/
          
          if [ -d ".poly/lib" ]; then
            cp -r .poly/lib/* build_dist/node_modules/polyapi/.poly/lib/
          elif [ -d "node_modules/polyapi/.poly/lib" ]; then
            cp -r node_modules/polyapi/.poly/lib/* build_dist/node_modules/polyapi/.poly/lib/
          else
            # If there is no 'lib' folder, copy everything into it anyway
            # to satisfy the SDK's require('./poly/lib/index.js')
            cp -r .poly/* build_dist/node_modules/polyapi/.poly/lib/ || true
          fi

          # 5. VERIFICATION (Check if index.js is physically at the problematic path)
          ls -la build_dist/node_modules/polyapi/.poly/lib/index.js
          
          # 6. ZIP
          TS=$(date +%s)
          ZIP_NAME="optimizer_$TS.zip"
          cd build_dist && zip -r "../$ZIP_NAME" . && cd ..
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Apply
        # Pass the zip_name variable to Terraform
        run: |
          terraform apply -auto-approve -input=false \
            -var="poly_api_key=${{ secrets.POLY_API_KEY }}" \
            -var="lambda_zip_path=${{ steps.package.outputs.zip_name }}"
