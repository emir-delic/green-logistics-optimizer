name: Sovereign Stack Deploy

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'aws/**'
      - 'main.tf'

concurrency:
  group: terraform
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-central-1
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_poly_api_key: ${{ secrets.POLY_API_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PolyAPI SDK
        # This ensures the node_modules exist for Terraform to zip into the Layer
        run: |
          npm install polyapi@eu1
          # Create the required internal config directory
          mkdir -p node_modules/polyapi/.poly
          
          # Inject the sovereign configuration directly into the PolyAPI config file
          cat <<EOF > node_modules/polyapi/.poly/.config.env
          POLY_API_KEY=${{ secrets.POLY_API_KEY }}
          POLY_API_BASE_URL=https://eu1.polyapi.io
          EOF
          
          # Now run generate with NO arguments
          npx poly generate

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false