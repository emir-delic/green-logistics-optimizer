name: Sovereign Stack Deploy

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'aws/**'
      - 'main.tf'
      - '.github/workflows/deploy.yml'

concurrency:
  group: terraform
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-central-1
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_poly_api_key: ${{ secrets.POLY_API_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PolyAPI SDK & Package Lambda
        env:
          POLY_API_KEY: ${{ secrets.POLY_API_KEY }}
          POLY_API_BASE_URL: https://eu1.polyapi.io
        run: |
          npm install polyapi@eu1
          npx poly generate
          
          # 1. Prepare a clean build folder
          mkdir -p build_dist/node_modules/polyapi
          
          # 2. Copy your Lambda code (Note: changed to index.js)
          cp aws/lambda/green-logistics-optimizer-lambda-edelic/index.js build_dist/
          
          # 3. Copy the SDK AND the hidden brain (.poly)
          cp -r node_modules/polyapi/* build_dist/node_modules/polyapi/
          cp -r node_modules/.poly build_dist/node_modules/polyapi/
          
          # 4. ZIP from INSIDE the folder, but output to the ROOT
          cd build_dist
          zip -r ../optimizer.zip .
          cd ..
          
          # 5. Verification: This SHOULD now show the file in the root
          ls -lh optimizer.zip

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false