name: Sovereign Stack Deploy

on:
  push:
    branches: [ main, dev ]
    paths:
      - 'aws/**'
      - 'main.tf'
      - '.github/workflows/deploy.yml'

concurrency:
  group: terraform
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-central-1
      TF_VAR_aws_account_id: ${{ secrets.AWS_ACCOUNT_ID }}
      TF_VAR_poly_api_key: ${{ secrets.POLY_API_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install PolyAPI SDK & Package Lambda
        id: package
        env:
          POLY_API_KEY: ${{ secrets.POLY_API_KEY }}
          POLY_API_BASE_URL: https://eu1.polyapi.io
        run: |
          npm install polyapi@eu1
          npx poly generate
          
          # 1. Create the final target structure
          mkdir -p build_dist/node_modules/polyapi/.poly/lib
          
          # 2. Copy handler and base package
          cp aws/lambda/green-logistics-optimizer-lambda-edelic/index.mjs build_dist/
          cp -r node_modules/polyapi/* build_dist/node_modules/polyapi/
          
          # 3. LOCATE THE BRAIN:
          # This finds the .poly directory wherever it was actually created
          GEN_POLY=$(find . -name ".poly" -type d -not -path "./build_dist*" | head -n 1)
          
          if [ -z "$GEN_POLY" ]; then
            echo "ERROR: .poly folder not found anywhere!"
            ls -R # Dump everything to logs so we can see the structure
            exit 1
          fi
          
          echo "Found .poly at: $GEN_POLY"
          
          # 4. MOVE CONTENTS TO /lib
          # We copy the files from inside the found .poly folder into the expected /lib
          if [ -d "$GEN_POLY/lib" ]; then
            cp -r "$GEN_POLY/lib/"* build_dist/node_modules/polyapi/.poly/lib/
          else
            cp -r "$GEN_POLY/"* build_dist/node_modules/polyapi/.poly/lib/
          fi

          # 5. FINAL VERIFY
          ls -la build_dist/node_modules/polyapi/.poly/lib/index.js
          
          # 6. ZIP
          TS=$(date +%s)
          ZIP_NAME="optimizer_$TS.zip"
          cd build_dist && zip -r "../$ZIP_NAME" . && cd ..
          echo "zip_name=$ZIP_NAME" >> $GITHUB_OUTPUT

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -reconfigure

      - name: Terraform Apply
        # Pass the zip_name variable to Terraform
        run: |
          terraform apply -auto-approve -input=false \
            -var="poly_api_key=${{ secrets.POLY_API_KEY }}" \
            -var="lambda_zip_path=${{ steps.package.outputs.zip_name }}"
